<!DOCTYPE html>
<html lang="en" data-theme="ops">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AO — Work Tracker</title>
<link rel="stylesheet" href="ao-theme.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--text-dim:rgba(200,195,185,0.7);--text-mid:rgba(220,215,205,0.85)}
[data-theme="midnight"]{--text-dim:rgba(180,200,225,0.65);--text-mid:rgba(200,215,235,0.82)}
[data-theme="greenhouse"]{--text-dim:rgba(195,205,195,0.65);--text-mid:rgba(215,225,215,0.82)}
[data-theme="sandstone"]{--text-dim:rgba(205,195,185,0.65);--text-mid:rgba(225,215,205,0.82)}
[data-theme="studio"]{--text-dim:rgba(80,75,70,0.6);--text-mid:rgba(50,48,45,0.75)}
[data-theme="daybreak"]{--text-dim:rgba(60,70,90,0.55);--text-mid:rgba(40,50,70,0.72)}
body{font-family:'Inter','SF Pro Text',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;
  background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90}
.topbar h1{font-size:15px;font-weight:600;letter-spacing:.3px;color:rgb(var(--amber))}
.topbar .meta{font-size:13px;color:var(--text-dim)}
.topbar .actions{display:flex;gap:10px;align-items:center}
.topbar .actions button{background:var(--panel);border:1px solid var(--border);color:var(--text-dim);
  padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;transition:.2s}
.topbar .actions button:hover{border-color:rgb(var(--amber));color:rgb(var(--amber))}
.topbar .actions button.active{background:rgba(var(--amber),.15);border-color:rgb(var(--amber));color:rgb(var(--amber))}

/* ── Filter chips ── */
.filters{display:flex;gap:8px;padding:16px 28px;background:var(--bg);border-bottom:1px solid var(--border)}
.chip{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;
  background:var(--panel);border:1px solid var(--border);color:var(--text-dim);transition:.2s}
.chip:hover,.chip.active{background:rgba(var(--amber),.12);border-color:rgb(var(--amber));color:rgb(var(--amber))}
.chip .count{margin-left:5px;opacity:.6}

/* ── Stats bar ── */
.stats{display:flex;gap:24px;padding:12px 28px;font-size:13px;color:var(--text-mid)}
.stat-val{font-weight:700;color:var(--text);margin-right:4px}
.stat-live{color:rgb(var(--green))}
.stat-wip{color:rgb(var(--amber))}

/* ── Table ── */
.table-wrap{padding:0 28px 40px}
table{width:100%;border-collapse:collapse;font-size:15px}
th{text-align:left;padding:10px 14px;font-size:12px;font-weight:600;text-transform:uppercase;
  letter-spacing:.6px;color:rgb(var(--amber));background:rgba(var(--amber),.08);
  border-bottom:2px solid rgba(var(--amber),.25);position:sticky;top:49px;z-index:10}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5}

/* Domain group header */
tr.domain-header td{padding:14px 14px 8px;font-size:13px;font-weight:600;
  color:var(--text-dim);background:var(--bg);border-bottom:1px solid var(--border);
  letter-spacing:.3px;cursor:pointer;user-select:none}
tr.domain-header td .hex{color:rgb(var(--amber));margin-right:6px;font-size:14px}
tr.domain-header td .host{color:var(--text-dim);font-weight:400;margin-left:6px;opacity:.6}
tr.domain-header:hover td{background:var(--panel)}

/* Section header */
tr.section-header td{padding:20px 12px 8px;font-size:13px;font-weight:700;
  color:rgb(var(--amber));background:rgba(var(--amber),.06);border-bottom:2px solid rgba(var(--amber),.2);
  text-transform:uppercase;letter-spacing:1px}

/* Data rows */
tr.data-row{transition:background .15s}
tr.data-row:hover{background:var(--panel)}
tr.data-row td{background:transparent}

/* Status badges */
.badge{display:inline-block;padding:3px 11px;border-radius:12px;font-size:12px;font-weight:600;letter-spacing:.3px}
.badge-live{background:rgba(var(--green),.12);color:rgb(var(--green))}
.badge-wip{background:rgba(var(--amber),.12);color:rgb(var(--amber))}
.badge-ready{background:rgba(var(--blue),.12);color:rgb(var(--blue,140,185,235))}
.badge-new{background:rgba(var(--purple),.12);color:rgb(var(--purple))}

/* Access badges */
.access{font-size:13px;font-weight:600}
.access-public{color:rgb(var(--green))}
.access-admin{color:rgb(var(--purple))}
.access-both{color:rgb(var(--amber))}

/* URL links */
.url-link{color:rgb(var(--purple));text-decoration:none;font-weight:500;font-size:13px;
  border-bottom:1px solid transparent;transition:.2s}
.url-link:hover{border-bottom-color:rgb(var(--purple))}
.url-none{color:var(--text-dim);opacity:.4;font-size:13px}

/* Domain tag */
.domain-tag{font-size:13px;color:var(--text-mid);background:var(--panel);
  padding:3px 10px;border-radius:5px;display:inline-block;white-space:nowrap}

/* File name */
.file-name{font-size:13px;color:var(--text-mid)}

/* Num column */
.num{color:var(--text-dim);font-size:13px;opacity:.5;font-weight:500}

/* Details */
.details{color:var(--text-mid);font-size:14px;line-height:1.55;max-width:360px}

/* Collapsible */
tr.collapsed{display:none}

/* Infra section */
.infra-table{margin-top:8px}
.infra-table td{font-size:12px;padding:8px 12px}
.infra-comp{font-weight:600;color:var(--text)}
.infra-stack{color:var(--text-dim)}
.infra-notes{color:var(--text-dim);opacity:.7;font-size:11px}

/* Responsive */
@media(max-width:900px){
  .topbar{padding:12px 16px}
  .filters{padding:12px 16px}
  .table-wrap{padding:0 8px 40px}
  td,th{padding:6px 8px;font-size:12px}
  .details{max-width:200px}
}
</style>
</head>
<body>

<script>

  localStorage.setItem('ao_admin','1');
})();

// ── Render ──
var tbody = document.getElementById('tbody');
var allItems = [];
var collapsedGroups = {};

function statusBadge(s){
  var cls = s==='Live'?'badge-live':s==='WIP'?'badge-wip':s==='Ready'?'badge-ready':'badge-new';
  return '<span class="badge '+cls+'">'+s+'</span>';
}
function accessLabel(a){
  var cls = a==='Public'?'access-public':a==='Admin'?'access-admin':'access-both';
  return '<span class="access '+cls+'">'+a+'</span>';
}
function urlCell(item){
  if(item.href) return '<a class="url-link" href="'+item.href+'" target="_blank" rel="noopener">'+item.url+'</a>';
  return '<span class="url-none">'+item.url+'</span>';
}

function render(filter){
  tbody.innerHTML = '';
  var shown = 0, total = 0;

  DATA.sections.forEach(function(sec){
    // Section header
    var sr = document.createElement('tr');
    sr.className = 'section-header';
    sr.innerHTML = '<td colspan="9">'+sec.title+'</td>';
    tbody.appendChild(sr);

    sec.groups.forEach(function(grp){
      var gid = grp.domain.replace(/\s/g,'_');
      // Domain sub-header
      var dr = document.createElement('tr');
      dr.className = 'domain-header';
      dr.setAttribute('data-group', gid);
      var hostLabel = grp.host ? ' <span class="host">• '+grp.host+'</span>' : '';
      dr.innerHTML = '<td colspan="9"><span class="hex">⬡</span>'+grp.domain+hostLabel+
        ' <span style="float:right;opacity:.4;font-size:11px">'+grp.items.length+'</span></td>';
      dr.onclick = function(){ toggleGroup(gid); };
      tbody.appendChild(dr);

      grp.items.forEach(function(item){
        total++;
        if(filter && filter!=='all'){
          if(filter==='live' && item.status!=='Live') return;
          if(filter==='wip' && item.status!=='WIP') return;
          if(filter==='public' && item.access!=='Public') return;
          if(filter==='admin' && item.access!=='Admin') return;
          if(filter==='ghpages' && item.domain.indexOf('GitHub')===- 1) return;
          if(filter==='vps' && item.domain.indexOf('VPS')===-1 && item.domain.indexOf('Oracle')===-1) return;
        }
        shown++;
        var tr = document.createElement('tr');
        tr.className = 'data-row';
        tr.setAttribute('data-group', gid);
        if(collapsedGroups[gid]) tr.classList.add('collapsed');
        tr.innerHTML =
          '<td class="num">'+item.n+'</td>'+
          '<td style="font-weight:500">'+item.feature+'</td>'+
          '<td>'+statusBadge(item.status)+'</td>'+
          '<td>'+accessLabel(item.access)+'</td>'+
          '<td><span class="domain-tag">'+item.domain+'</span></td>'+
          '<td class="details">'+item.details+'</td>'+
          '<td class="file-name">'+item.files+'</td>'+
          '<td>'+urlCell(item)+'</td>'+
          '<td style="font-size:12px;color:var(--text-dim)">'+item.date+'</td>';
        tbody.appendChild(tr);
      });
    });
  });

  // Infra section
  var ir = document.createElement('tr');
  ir.className = 'section-header';
  ir.innerHTML = '<td colspan="9">Infrastructure</td>';
  tbody.appendChild(ir);
  DATA.infra.forEach(function(inf){
    var tr = document.createElement('tr');
    tr.className = 'data-row';
    tr.innerHTML = '<td></td><td class="infra-comp">'+inf.comp+'</td><td colspan="3" class="infra-stack">'+inf.stack+
      '</td><td colspan="4" class="infra-notes">'+inf.notes+'</td>';
    tbody.appendChild(tr);
  });

  // Stats
  var liveCount=0, wipCount=0;
  DATA.sections.forEach(function(s){s.groups.forEach(function(g){g.items.forEach(function(i){
    if(i.status==='Live')liveCount++;
    if(i.status==='WIP')wipCount++;
  })})});
  document.getElementById('stats').innerHTML =
    '<div><span class="stat-val">'+total+'</span> deliverables</div>'+
    '<div><span class="stat-val stat-live">'+liveCount+'</span> live</div>'+
    '<div><span class="stat-val stat-wip">'+wipCount+'</span> WIP</div>'+
    '<div><span class="stat-val">'+shown+'</span> shown</div>';
}

function toggleGroup(gid){
  collapsedGroups[gid] = !collapsedGroups[gid];
  document.querySelectorAll('tr[data-group="'+gid+'"]').forEach(function(tr){
    if(!tr.classList.contains('domain-header')){
      tr.classList.toggle('collapsed', collapsedGroups[gid]);
    }
  });
}
function toggleAll(){
  var anyOpen = Object.keys(collapsedGroups).some(function(k){return !collapsedGroups[k]});
  DATA.sections.forEach(function(s){s.groups.forEach(function(g){
    var gid = g.domain.replace(/\s/g,'_');
    collapsedGroups[gid] = anyOpen;
  })});
  render(activeFilter);
}

// Filters
var activeFilter = 'all';
var filters = [
  {id:'all',label:'All'},
  {id:'live',label:'Live'},
  {id:'wip',label:'WIP'},
  {id:'public',label:'Public'},
  {id:'admin',label:'Admin'},
  {id:'ghpages',label:'GH Pages'},
  {id:'vps',label:'VPS'}
];
var filtersEl = document.getElementById('filters');
filters.forEach(function(f){
  var chip = document.createElement('span');
  chip.className = 'chip' + (f.id==='all'?' active':'');
  chip.textContent = f.label;
  chip.onclick = function(){
    activeFilter = f.id;
    document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('active')});
    chip.classList.add('active');
    render(f.id);
  };
  filtersEl.appendChild(chip);
});

// Theme persistence
(function(){
  var t = localStorage.getItem('ao_theme');
  if(t) document.documentElement.setAttribute('data-theme', t);
})();

render('all');
</script>
