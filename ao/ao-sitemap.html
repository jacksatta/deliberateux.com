<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AO — Sitemap Navigator</title>
<link rel="icon" href="/assets/favicon.svg">
<link rel="stylesheet" href="ao-theme.css">
<script>(function(){var t=localStorage.getItem('ao_theme');if(t)document.documentElement.dataset.theme=t})()</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);color:var(--text);background:var(--bg);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* Topbar */
.topbar{height:44px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--hairline);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100}
.tb-logo{font-size:0.82rem;font-weight:700;display:flex;align-items:center;gap:7px;color:var(--text);text-decoration:none}
.tb-dot{width:6px;height:6px;border-radius:50%;background:rgb(var(--amber));box-shadow:0 0 6px rgba(var(--amber),0.5)}
.tb-title{font-size:0.78rem;color:var(--muted);font-weight:500;margin-right:auto}
.tb-btn{font-family:var(--font);font-size:0.7rem;font-weight:600;padding:5px 11px;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.tb-btn:hover{color:var(--text);border-color:rgba(var(--amber),0.4)}
.tb-btn.active{background:rgba(var(--amber),0.12);border-color:rgba(var(--amber),0.3);color:rgb(var(--amber))}

/* Layout */
.body{display:flex;flex:1;overflow:hidden}

/* Left: Tree Panel */
.tree-panel{width:320px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--hairline);display:flex;flex-direction:column;overflow:hidden;transition:width 0.2s}
.tree-panel.collapsed{width:48px}
.tree-panel.collapsed .tp-content{display:none}
.tree-panel.collapsed .tp-toggle{transform:rotate(180deg)}

.tp-header{height:40px;display:flex;align-items:center;padding:0 12px;gap:8px;border-bottom:1px solid var(--hairline);flex-shrink:0}
.tp-header-title{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted)}
.tp-toggle{margin-left:auto;background:none;border:none;color:var(--ghost);cursor:pointer;font-size:0.7rem;padding:4px;transition:transform 0.2s}
.tp-toggle:hover{color:var(--muted)}

.tp-content{flex:1;overflow-y:auto;padding:8px 0}

/* Tree audience filter */
.tp-filters{display:flex;gap:3px;padding:4px 10px 8px;border-bottom:1px solid var(--hairline);margin-bottom:6px}
.tp-filter{font-size:0.62rem;font-weight:600;padding:4px 8px;border-radius:5px;border:1px solid transparent;background:none;color:var(--ghost);cursor:pointer;transition:all 0.15s}
.tp-filter:hover{color:var(--muted)}
.tp-filter.active{background:rgba(var(--amber),0.1);border-color:rgba(var(--amber),0.2);color:rgb(var(--amber))}

/* Tree nodes */
.tree-section{padding:2px 0}
.tree-section-header{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--ghost);padding:8px 14px 4px;display:flex;align-items:center;gap:6px}
.tree-section-header::after{content:'';flex:1;height:1px;background:var(--hairline)}

.tree-node{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;transition:all 0.12s;border-left:3px solid transparent;position:relative}
.tree-node:hover{background:rgba(var(--amber),0.04)}
.tree-node.active{background:rgba(var(--amber),0.08);border-left-color:rgb(var(--amber))}
.tree-node.active .tn-name{color:var(--text)}

.tn-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;flex-shrink:0}
.tn-text{flex:1;min-width:0}
.tn-name{font-size:0.78rem;font-weight:600;line-height:1.2;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tn-sub{font-size:0.6rem;color:var(--ghost);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tn-badges{display:flex;gap:3px;flex-shrink:0}
.tn-badge{font-size:0.5rem;font-weight:700;padding:2px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:0.04em}
.tn-badge.prospect{background:rgba(var(--purple),0.12);color:rgba(var(--purple),0.8)}
.tn-badge.customer{background:rgba(var(--blue),0.12);color:rgba(var(--blue),0.8)}
.tn-badge.admin{background:rgba(var(--red),0.1);color:rgba(var(--red),0.7)}
.tn-badge.new{background:rgba(var(--amber),0.12);color:rgba(var(--amber),0.8);border:1px dashed rgba(var(--amber),0.3)}

.tree-node.indent-1{padding-left:30px}
.tree-node.indent-2{padding-left:46px}

/* Connector lines for children */
.tree-node.indent-1::before,.tree-node.indent-2::before{
  content:'';position:absolute;left:20px;top:0;bottom:50%;width:1px;background:var(--hairline)
}
.tree-node.indent-2::before{left:36px}

/* Right: Preview Panel */
.preview-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.pp-bar{height:36px;display:flex;align-items:center;padding:0 12px;gap:8px;background:var(--surface);border-bottom:1px solid var(--hairline);flex-shrink:0}
.pp-url{flex:1;font-family:var(--mono,monospace);font-size:0.68rem;color:var(--ghost);background:var(--panel);padding:5px 10px;border-radius:5px;border:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pp-open{font-size:0.62rem;font-weight:600;padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;text-decoration:none;transition:all 0.12s}
.pp-open:hover{color:var(--text);border-color:rgba(var(--amber),0.4)}
.pp-frame-wrap{flex:1;position:relative;overflow:hidden}
.pp-frame{width:100%;height:100%;border:none;background:var(--bg)}
.pp-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ghost);gap:12px}
.pp-placeholder.hidden{display:none}
.pp-placeholder-icon{font-size:2.5rem;opacity:0.3}
.pp-placeholder-text{font-size:0.82rem;font-weight:500}
.pp-placeholder-sub{font-size:0.68rem;color:var(--faint);max-width:280px;text-align:center;line-height:1.5}

/* Status indicator */
.pp-status{display:flex;align-items:center;gap:6px}
.pp-status-dot{width:7px;height:7px;border-radius:50%}
.pp-status-dot.live{background:rgb(var(--green));box-shadow:0 0 6px rgba(var(--green),0.5)}
.pp-status-dot.static{background:rgb(var(--amber));box-shadow:0 0 6px rgba(var(--amber),0.4)}
.pp-status-label{font-size:0.58rem;font-weight:600;color:var(--ghost);text-transform:uppercase;letter-spacing:0.06em}

/* Flow overview */
.flow-map{position:absolute;bottom:12px;right:12px;width:180px;background:var(--overlay2);border:1px solid var(--border2);border-radius:8px;padding:8px;z-index:10;display:none}
.flow-map.v{display:block}
.flow-map canvas{width:100%;border-radius:4px}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <a class="tb-logo" href="/ao/"><div class="tb-dot"></div>AO</a>
  <span class="tb-title">Sitemap Navigator</span>
  <button class="tb-btn" id="view-all" onclick="setFilter('all')">All Pages</button>
  <button class="tb-btn" id="view-prospect" onclick="setFilter('prospect')">Prospect</button>
  <button class="tb-btn" id="view-customer" onclick="setFilter('customer')">Customer</button>
  <button class="tb-btn" id="view-admin" onclick="setFilter('admin')">Admin</button>
</div>

<div class="body">
  <!-- Left: Page Tree -->
  <div class="tree-panel" id="tree-panel">
    <div class="tp-header">
      <span class="tp-header-title">Pages</span>
      <button class="tp-toggle" id="tp-toggle" onclick="toggleTree()">◀</button>
    </div>
    <div class="tp-content" id="tp-content"></div>
  </div>

  <!-- Right: Preview -->
  <div class="preview-panel">
    <div class="pp-bar">
      <div class="pp-status" id="pp-status" style="display:none">
        <div class="pp-status-dot" id="pp-status-dot"></div>
        <span class="pp-status-label" id="pp-status-label"></span>
      </div>
      <div class="pp-url" id="pp-url">Select a page to preview</div>
      <a class="pp-open" id="pp-open" href="#" target="_blank" style="display:none">Open ↗</a>
    </div>
    <div class="pp-frame-wrap">
      <iframe class="pp-frame" id="pp-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      <div class="pp-placeholder" id="pp-placeholder">
        <div class="pp-placeholder-icon">◇</div>
        <div class="pp-placeholder-text">AO Sitemap Navigator</div>
        <div class="pp-placeholder-sub">Click any page in the tree to preview it here. Use the filters to see what each audience experiences.</div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  // Page definitions — the single source of truth
  var PAGES = [
    // Entry points
    {id:'landing', name:'Landing', file:'index.html', section:'Entry', indent:0,
     desc:'Marketing overview, two CTAs', icon:'◇', iconBg:'amber',
     audience:['prospect','customer','admin'], status:'static'},

    {id:'login', name:'Login / Auth Gate', file:null, section:'Entry', indent:0,
     desc:'Auth gate — new page needed', icon:'🔒', iconBg:'amber',
     audience:['customer','admin'], status:'new'},

    // Dashboard (the roof)
    {id:'dashboard', name:'Dashboard', file:'dashboard.html', section:'Dashboard (the roof)', indent:0,
     desc:'My Orgs grid — top-level container', icon:'▦', iconBg:'amber',
     audience:['prospect','customer','admin'], status:'static',
     notes:'Prospect sees demo sandbox; Customer sees own orgs; Admin sees all orgs + services'},

    // Org-scoped pages
    {id:'org', name:'Org Home', file:'org.html', section:'Inside an Org', indent:1,
     desc:'Agents, tasks, workspace for one org', icon:'◎', iconBg:'green',
     audience:['prospect','customer','admin'], status:'static', parent:'dashboard'},

    {id:'queue', name:'Queue', file:'queue.html', section:'Inside an Org', indent:2,
     desc:'Live work queue scoped to org', icon:'≡', iconBg:'blue',
     audience:['prospect','customer','admin'], status:'static', parent:'org'},

    {id:'flows', name:'Flows', file:'flows.html', section:'Inside an Org', indent:2,
     desc:'Visual workflow canvas', icon:'⤳', iconBg:'purple',
     audience:['customer','admin'], status:'static', parent:'org'},

    {id:'configure', name:'Configure', file:'configure.html', section:'Inside an Org', indent:2,
     desc:'Role builder — agent/human toggles', icon:'⚙', iconBg:'amber',
     audience:['customer','admin'], status:'static', parent:'org'},

    // Onboard flow
    {id:'onboard', name:'Onboard', file:'onboard.html', section:'Onboard Flow', indent:1,
     desc:'5-step org setup wizard', icon:'✦', iconBg:'green',
     audience:['customer','admin'], status:'static', parent:'dashboard'},

    {id:'bootup', name:'Bootup', file:'bootup.html', section:'Onboard Flow', indent:2,
     desc:'Agent provisioning animation', icon:'⚡', iconBg:'green',
     audience:['customer','admin'], status:'static', parent:'onboard'},

    // Admin-only
    {id:'cs-backdoor', name:'CS Backdoor', file:null, section:'Admin Only', indent:1,
     desc:'Agent-mediated support entry — new', icon:'🛡', iconBg:'red',
     audience:['admin'], status:'new', parent:'dashboard'},

    {id:'theme-studio', name:'Theme Studio', file:'theme-studio-local.html', section:'Admin Only', indent:1,
     desc:'CSS token editor', icon:'🎨', iconBg:'red',
     audience:['admin'], status:'static', parent:'dashboard'},

    // Sitemap itself
    {id:'sitemap', name:'Sitemap (this page)', file:'ao-sitemap.html', section:'Meta', indent:0,
     desc:'You are here', icon:'🗺', iconBg:'amber',
     audience:['admin'], status:'static'}
  ];

  var colorMap = {
    amber:'var(--amber)', green:'var(--green)', blue:'var(--blue)',
    purple:'var(--purple)', red:'var(--red)', cyan:'var(--cyan)'
  };

  var currentFilter = 'all';
  var currentPage = null;

  // Build tree
  function renderTree(){
    var container = document.getElementById('tp-content');
    container.innerHTML = '';
    var lastSection = '';

    PAGES.forEach(function(page){
      // Filter
      if(currentFilter !== 'all' && page.audience.indexOf(currentFilter) === -1) return;

      // Section header
      if(page.section !== lastSection){
        lastSection = page.section;
        var hdr = document.createElement('div');
        hdr.className = 'tree-section-header';
        hdr.textContent = page.section;
        container.appendChild(hdr);
      }

      var node = document.createElement('div');
      node.className = 'tree-node' + (page.indent ? ' indent-'+page.indent : '') + (currentPage === page.id ? ' active' : '');
      node.dataset.pageId = page.id;

      var rgb = colorMap[page.iconBg] || 'var(--amber)';
      var badges = '';
      page.audience.forEach(function(a){
        badges += '<span class="tn-badge '+a+'">'+a.charAt(0).toUpperCase()+'</span>';
      });
      if(page.status === 'new'){
        badges += '<span class="tn-badge new">new</span>';
      }

      node.innerHTML =
        '<div class="tn-icon" style="background:rgba('+rgb+',0.12);color:rgba('+rgb+',0.9)">'+page.icon+'</div>' +
        '<div class="tn-text"><div class="tn-name">'+page.name+'</div><div class="tn-sub">'+page.desc+'</div></div>' +
        '<div class="tn-badges">'+badges+'</div>';

      node.addEventListener('click', function(){ loadPage(page) });
      container.appendChild(node);
    });
  }

  function loadPage(page){
    currentPage = page.id;

    // Update tree active state
    document.querySelectorAll('.tree-node').forEach(function(n){
      n.classList.toggle('active', n.dataset.pageId === page.id);
    });

    var frame = document.getElementById('pp-frame');
    var url = document.getElementById('pp-url');
    var open = document.getElementById('pp-open');
    var placeholder = document.getElementById('pp-placeholder');
    var status = document.getElementById('pp-status');
    var statusDot = document.getElementById('pp-status-dot');
    var statusLabel = document.getElementById('pp-status-label');

    if(!page.file){
      // Page doesn't exist yet
      placeholder.classList.remove('hidden');
      placeholder.querySelector('.pp-placeholder-icon').textContent = page.icon;
      placeholder.querySelector('.pp-placeholder-text').textContent = page.name;
      placeholder.querySelector('.pp-placeholder-sub').textContent = 'This page needs to be built. ' + page.desc;
      frame.src = 'about:blank';
      url.textContent = '/ao/' + page.id + '.html — not yet built';
      open.style.display = 'none';
      status.style.display = 'flex';
      statusDot.className = 'pp-status-dot';
      statusDot.style.background = 'var(--ghost)';
      statusLabel.textContent = 'TO BUILD';
      return;
    }

    placeholder.classList.add('hidden');
    frame.src = page.file;
    url.textContent = '/ao/' + page.file;
    open.href = page.file;
    open.style.display = 'inline-flex';

    status.style.display = 'flex';
    statusDot.className = 'pp-status-dot ' + (page.status === 'new' ? '' : 'live');
    statusLabel.textContent = page.status === 'new' ? 'PLANNED' : 'LIVE';
  }

  window.setFilter = function(f){
    currentFilter = f;
    document.querySelectorAll('.tb-btn').forEach(function(b){
      b.classList.toggle('active', b.id === 'view-'+f);
    });
    renderTree();
  };

  window.toggleTree = function(){
    document.getElementById('tree-panel').classList.toggle('collapsed');
  };

  // Init
  renderTree();
  document.getElementById('view-all').classList.add('active');
})();
</script>
</body>
</html>
