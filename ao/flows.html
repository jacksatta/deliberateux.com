<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flows — AO</title>
  <meta name="description" content="Build agent workflows visually. Connect roles into pipelines and watch work flow through your org." />
  <link rel="icon" href="/assets/favicon.svg" />
  <style>
    :root {
      --bg: #070812;
      --bg2: #0b1021;
      --panel: rgba(255,255,255,0.05);
      --panel2: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.09);
      --border2: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.58);
      --faint: rgba(255,255,255,0.38);
      --ghost: rgba(255,255,255,0.22);
      --hairline: rgba(255,255,255,0.07);
      --purple: 168,139,250;
      --green: 52,211,153;
      --blue: 96,165,250;
      --amber: 245,158,11;
      --pink: 244,114,182;
      --yellow: 251,191,36;
      --red: 248,113,113;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 8px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --ease: cubic-bezier(.2,.8,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: var(--font); color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }

    /* ── Top bar ─────────────────────────────────── */
    .flow-topbar {
      height: 48px; flex-shrink: 0;
      background: rgba(7,8,18,0.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--hairline);
      display: flex; align-items: center;
      padding: 0 16px; gap: 12px; z-index: 100;
    }
    .flow-topbar-logo {
      font-size: 0.85rem; font-weight: 700;
      display: flex; align-items: center; gap: 7px;
      color: var(--text); text-decoration: none;
    }
    .ftl-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgb(var(--purple));
      box-shadow: 0 0 6px rgba(var(--purple),0.5);
    }
    .flow-topbar-title {
      font-size: 0.82rem; color: var(--muted);
      font-weight: 500; margin-right: auto;
    }
    .ftb-btn {
      font-family: var(--font); font-size: 0.75rem; font-weight: 600;
      padding: 5px 12px; border-radius: 6px;
      border: 1px solid var(--border2);
      background: none; color: var(--muted);
      cursor: pointer; transition: all 0.15s;
    }
    .ftb-btn:hover { color: var(--text); border-color: rgba(var(--purple),0.4); }
    .ftb-btn.primary {
      background: rgba(var(--purple),0.14);
      border-color: rgba(var(--purple),0.3);
      color: rgb(var(--purple));
    }
    .ftb-btn.primary:hover { background: rgba(var(--purple),0.22); }
    .ftb-btn.run {
      background: rgba(var(--green),0.14);
      border-color: rgba(var(--green),0.3);
      color: rgb(var(--green));
    }
    .ftb-btn.run:hover { background: rgba(var(--green),0.22); }
    .ftb-sep { width: 1px; height: 24px; background: var(--hairline); }

    /* ── Layout: sidebar + canvas ─────────────── */
    .flow-body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────── */
    .flow-sidebar {
      width: 220px; flex-shrink: 0;
      background: rgba(7,8,18,0.7);
      border-right: 1px solid var(--hairline);
      padding: 16px 12px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px;
    }
    .sidebar-label {
      font-size: 0.65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--ghost); margin: 8px 0 4px;
    }
    .sidebar-label:first-child { margin-top: 0; }
    .drag-node {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      cursor: grab; user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .drag-node:hover { border-color: var(--border2); background: var(--panel2); }
    .drag-node:active { cursor: grabbing; }
    .dn-icon {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 700; flex-shrink: 0;
    }
    .dn-info { flex: 1; min-width: 0; }
    .dn-name { font-size: 0.78rem; font-weight: 600; }
    .dn-type { font-size: 0.62rem; color: var(--faint); font-family: var(--mono); }

    /* ── Canvas ──────────────────────────────────── */
    .flow-canvas-wrap {
      flex: 1; position: relative; overflow: hidden;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);
      background-size: 24px 24px;
    }
    .flow-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* SVG connections layer */
    .connections-svg {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }
    .conn-line {
      fill: none; stroke: rgba(var(--purple),0.4);
      stroke-width: 2; stroke-linecap: round;
    }
    .conn-line.active {
      stroke: rgba(var(--green),0.6);
      stroke-dasharray: 8 4;
      animation: flowDash 1s linear infinite;
    }
    @keyframes flowDash { to { stroke-dashoffset: -12; } }
    .conn-arrow { fill: rgba(var(--purple),0.5); }
    .conn-arrow.active { fill: rgba(var(--green),0.7); }

    /* Canvas nodes */
    .canvas-node {
      position: absolute;
      width: 160px;
      background: rgba(11,16,33,0.92);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 14px 12px 10px;
      cursor: move; user-select: none;
      z-index: 2;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .canvas-node:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.35); }
    .canvas-node.selected { border-color: rgba(var(--purple),0.5); box-shadow: 0 0 0 2px rgba(var(--purple),0.15); }
    .cn-head {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .cn-icon {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700; flex-shrink: 0;
    }
    .cn-name { font-size: 0.82rem; font-weight: 600; }
    .cn-label { font-size: 0.62rem; color: var(--faint); font-family: var(--mono); }

    /* Ports */
    .cn-ports {
      display: flex; justify-content: space-between;
      margin-top: 6px; padding-top: 6px;
      border-top: 1px solid var(--hairline);
    }
    .cn-port {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(var(--purple),0.3);
      border: 2px solid rgba(var(--purple),0.6);
      cursor: crosshair;
      transition: background 0.15s, transform 0.15s;
    }
    .cn-port:hover { background: rgba(var(--purple),0.6); transform: scale(1.3); }
    .cn-port.out { margin-left: auto; }
    .cn-port.in { margin-right: auto; }
    .cn-port.connected { background: rgb(var(--green)); border-color: rgb(var(--green)); }

    /* Remove button */
    .cn-remove {
      position: absolute; top: -6px; right: -6px;
      width: 18px; height: 18px; border-radius: 50%;
      background: rgba(248,113,113,0.9);
      border: none; color: #fff; font-size: 0.65rem;
      cursor: pointer; display: none;
      align-items: center; justify-content: center;
      z-index: 3;
    }
    .canvas-node:hover .cn-remove { display: flex; }

    /* ── Hint overlay ────────────────────────────── */
    .canvas-hint {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; color: var(--ghost);
      pointer-events: none; z-index: 0;
      transition: opacity 0.3s;
    }
    .canvas-hint.hidden { opacity: 0; }
    .canvas-hint h3 { font-size: 1rem; font-weight: 600; margin: 0 0 6px; color: var(--faint); }
    .canvas-hint p { font-size: 0.82rem; margin: 0; }

    /* ── Task runner panel ────────────────────────── */
    .runner-panel {
      position: absolute; bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(11,16,33,0.95);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 12px 18px;
      display: none; align-items: center; gap: 14px;
      z-index: 50; min-width: 360px;
      backdrop-filter: blur(12px);
    }
    .runner-panel.visible { display: flex; }
    .runner-task { font-size: 0.82rem; flex: 1; min-width: 0; }
    .runner-task .rt-label { font-size: 0.65rem; color: var(--ghost); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .runner-task .rt-text { margin-top: 2px; color: var(--muted); }
    .runner-agent {
      font-size: 0.7rem; font-weight: 700;
      padding: 3px 8px; border-radius: 5px;
      flex-shrink: 0;
    }
    .runner-status {
      font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 3px 8px; border-radius: 5px;
      flex-shrink: 0;
    }
    .runner-status.running { background: rgba(var(--blue),0.15); color: rgb(var(--blue)); }
    .runner-status.handoff { background: rgba(var(--amber),0.15); color: rgb(var(--amber)); }
    .runner-status.done { background: rgba(var(--green),0.15); color: rgb(var(--green)); }

    @media (max-width: 700px) {
      .flow-sidebar { width: 180px; }
      .canvas-node { width: 140px; }
    }
  </style>
</head>
<body>

  <div class="flow-topbar">
    <a href="/ao/" class="flow-topbar-logo"><span class="ftl-dot"></span> AO</a>
    <span class="flow-topbar-title" id="flow-title">/ Flows</span>
    <div class="ftb-sep"></div>
    <button class="ftb-btn" id="btn-clear">Clear</button>
    <button class="ftb-btn" id="btn-template">Load template</button>
    <button class="ftb-btn primary" id="btn-save">Save flow</button>
    <button class="ftb-btn run" id="btn-run">Run ▶</button>
  </div>

  <div class="flow-body">
    <div class="flow-sidebar" id="sidebar"></div>
    <div class="flow-canvas-wrap" id="canvas-wrap">
      <svg class="connections-svg" id="connections-svg"></svg>
      <div class="flow-canvas" id="canvas">
        <div class="canvas-hint" id="canvas-hint">
          <h3>Drag agents here</h3>
          <p>Connect them to build a workflow pipeline</p>
        </div>
      </div>
      <div class="runner-panel" id="runner-panel">
        <span class="runner-agent" id="runner-agent">—</span>
        <div class="runner-task">
          <div class="rt-label">Running task</div>
          <div class="rt-text" id="runner-text">—</div>
        </div>
        <span class="runner-status running" id="runner-status">Running</span>
      </div>
    </div>
  </div>

  <script>
    // ── Role data ────────────────────────────────────────
    var ROLES = [
      { id:'admin', name:'Lead Admin', abbr:'EA', rgb:'168,139,250', label:'orchestrator' },
      { id:'mkt',   name:'Marketing', abbr:'Mkt', rgb:'244,114,182', label:'marketing' },
      { id:'dev',   name:'Dev Lead', abbr:'Dev', rgb:'96,165,250', label:'engineering' },
      { id:'uxr',   name:'UX Research', abbr:'UXR', rgb:'52,211,153', label:'research' },
      { id:'qa',    name:'QA Guardian', abbr:'QA', rgb:'251,191,36', label:'quality' },
      { id:'biz',   name:'Biz Dev', abbr:'Biz', rgb:'147,197,253', label:'business' },
      { id:'cs',    name:'Customer Svc', abbr:'CS', rgb:'110,231,183', label:'support' },
      { id:'ops',   name:'Operations', abbr:'Ops', rgb:'248,113,113', label:'operations' },
      { id:'data',  name:'Data Analyst', abbr:'Data', rgb:'129,140,248', label:'analytics' },
      { id:'content',name:'Content', abbr:'Con', rgb:'232,121,249', label:'content' }
    ];
    var ROLE_MAP = {};
    ROLES.forEach(function(r){ ROLE_MAP[r.id] = r; });

    var SAMPLE_TASKS = {
      'cs-dev':    'Bug report triaged by CS, assigned to Dev',
      'cs-admin':  'Escalation from CS routed to Admin',
      'dev-qa':    'Feature PR submitted, needs QA review',
      'qa-dev':    'Regression found, sent back to Dev',
      'qa-admin':  'Release candidate approved, admin sign-off',
      'admin-mkt': 'Launch approved, Marketing to draft copy',
      'mkt-uxr':   'Landing page draft, needs UX review',
      'uxr-dev':   'Accessibility issues found, Dev fix needed',
      'admin-ops': 'Deploy request authorized',
      'ops-data':  'Deployment metrics forwarded to analytics',
      'admin-cs':  'New policy update, CS to communicate',
      'biz-admin': 'Revenue proposal ready for admin review',
      'data-mkt':  'Campaign metrics ready for marketing',
      'content-mkt':'Blog post draft for marketing review'
    };

    // ── State ────────────────────────────────────────────
    var nodes = [];       // { id, roleId, x, y, el }
    var connections = []; // { fromId, toId, el, arrowEl }
    var nextNodeId = 1;
    var dragging = null;  // { node, offsetX, offsetY }
    var connecting = null; // { fromId, fromPort }
    var running = false;

    // ── Build sidebar ────────────────────────────────────
    var sidebar = document.getElementById('sidebar');
    var lbl = document.createElement('div');
    lbl.className = 'sidebar-label';
    lbl.textContent = 'Agents';
    sidebar.appendChild(lbl);

    ROLES.forEach(function(role) {
      var el = document.createElement('div');
      el.className = 'drag-node';
      el.dataset.roleId = role.id;
      el.draggable = true;
      el.innerHTML =
        '<div class="dn-icon" style="background:rgba(' + role.rgb + ',0.14);color:rgba(' + role.rgb + ',0.9)">' + role.abbr + '</div>' +
        '<div class="dn-info"><div class="dn-name">' + role.name + '</div><div class="dn-type">' + role.label + '</div></div>';
      sidebar.appendChild(el);

      el.addEventListener('dragstart', function(e) {
        e.dataTransfer.setData('text/plain', role.id);
        e.dataTransfer.effectAllowed = 'copy';
      });
    });

    // ── Canvas drop ──────────────────────────────────────
    var canvas = document.getElementById('canvas');
    var canvasWrap = document.getElementById('canvas-wrap');
    var svg = document.getElementById('connections-svg');
    var hint = document.getElementById('canvas-hint');

    canvasWrap.addEventListener('dragover', function(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
    canvasWrap.addEventListener('drop', function(e) {
      e.preventDefault();
      var roleId = e.dataTransfer.getData('text/plain');
      if (!ROLE_MAP[roleId]) return;
      var rect = canvasWrap.getBoundingClientRect();
      var x = e.clientX - rect.left - 80;
      var y = e.clientY - rect.top - 40;
      addNode(roleId, x, y);
    });

    function addNode(roleId, x, y) {
      var role = ROLE_MAP[roleId];
      if (!role) return;
      var id = nextNodeId++;

      var el = document.createElement('div');
      el.className = 'canvas-node';
      el.dataset.nodeId = id;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.innerHTML =
        '<button class="cn-remove" data-node-id="' + id + '">&times;</button>' +
        '<div class="cn-head">' +
          '<div class="cn-icon" style="background:rgba(' + role.rgb + ',0.14);color:rgba(' + role.rgb + ',0.9)">' + role.abbr + '</div>' +
          '<div><div class="cn-name">' + role.name + '</div><div class="cn-label">' + role.label + '</div></div>' +
        '</div>' +
        '<div class="cn-ports">' +
          '<div class="cn-port in" data-node-id="' + id + '" data-port="in" title="Input"></div>' +
          '<div class="cn-port out" data-node-id="' + id + '" data-port="out" title="Output"></div>' +
        '</div>';

      canvas.appendChild(el);
      var node = { id: id, roleId: roleId, x: x, y: y, el: el };
      nodes.push(node);

      hint.classList.add('hidden');
      setupNodeDrag(node);
      setupPorts(el, id);

      // Remove button
      el.querySelector('.cn-remove').addEventListener('click', function(e) {
        e.stopPropagation();
        removeNode(id);
      });
    }

    function removeNode(id) {
      nodes = nodes.filter(function(n) {
        if (n.id === id) { n.el.remove(); return false; }
        return true;
      });
      connections = connections.filter(function(c) {
        if (c.fromId === id || c.toId === id) {
          if (c.el) c.el.remove();
          if (c.arrowEl) c.arrowEl.remove();
          return false;
        }
        return true;
      });
      updateConnections();
      if (nodes.length === 0) hint.classList.remove('hidden');
    }

    // ── Node dragging ────────────────────────────────────
    function setupNodeDrag(node) {
      var el = node.el;
      el.addEventListener('mousedown', function(e) {
        if (e.target.classList.contains('cn-port') || e.target.classList.contains('cn-remove')) return;
        var rect = el.getBoundingClientRect();
        dragging = { node: node, offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
        el.style.zIndex = 10;

        // Select
        document.querySelectorAll('.canvas-node').forEach(function(n){ n.classList.remove('selected'); });
        el.classList.add('selected');
      });
    }

    document.addEventListener('mousemove', function(e) {
      if (dragging) {
        var wrapRect = canvasWrap.getBoundingClientRect();
        var x = e.clientX - wrapRect.left - dragging.offsetX;
        var y = e.clientY - wrapRect.top - dragging.offsetY;
        dragging.node.x = x;
        dragging.node.y = y;
        dragging.node.el.style.left = x + 'px';
        dragging.node.el.style.top = y + 'px';
        updateConnections();
      }
      if (connecting && connecting.tempLine) {
        var wrapRect = canvasWrap.getBoundingClientRect();
        var mx = e.clientX - wrapRect.left;
        var my = e.clientY - wrapRect.top;
        var from = getPortPos(connecting.fromId, 'out');
        connecting.tempLine.setAttribute('d', bezierPath(from.x, from.y, mx, my));
      }
    });

    document.addEventListener('mouseup', function() {
      if (dragging) {
        dragging.node.el.style.zIndex = 2;
        dragging = null;
      }
      if (connecting && connecting.tempLine) {
        connecting.tempLine.remove();
        connecting = null;
      }
    });

    // ── Port connections ─────────────────────────────────
    function setupPorts(el, nodeId) {
      var outPort = el.querySelector('.cn-port.out');
      var inPort = el.querySelector('.cn-port.in');

      outPort.addEventListener('mousedown', function(e) {
        e.stopPropagation();
        e.preventDefault();
        var tempLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        tempLine.setAttribute('class', 'conn-line');
        tempLine.style.opacity = '0.5';
        svg.appendChild(tempLine);
        connecting = { fromId: nodeId, tempLine: tempLine };
      });

      inPort.addEventListener('mouseup', function(e) {
        if (connecting && connecting.fromId !== nodeId) {
          // Check no duplicate
          var exists = connections.some(function(c){ return c.fromId === connecting.fromId && c.toId === nodeId; });
          if (!exists) {
            addConnection(connecting.fromId, nodeId);
          }
        }
      });
    }

    function addConnection(fromId, toId) {
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      line.setAttribute('class', 'conn-line');
      svg.appendChild(line);

      var arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      arrow.setAttribute('class', 'conn-arrow');
      svg.appendChild(arrow);

      connections.push({ fromId: fromId, toId: toId, el: line, arrowEl: arrow });

      // Mark ports connected
      updatePortStyles();
      updateConnections();
    }

    function updatePortStyles() {
      nodes.forEach(function(n) {
        var hasIn = connections.some(function(c){ return c.toId === n.id; });
        var hasOut = connections.some(function(c){ return c.fromId === n.id; });
        var inP = n.el.querySelector('.cn-port.in');
        var outP = n.el.querySelector('.cn-port.out');
        if (inP) inP.classList.toggle('connected', hasIn);
        if (outP) outP.classList.toggle('connected', hasOut);
      });
    }

    function getPortPos(nodeId, type) {
      var node = nodes.find(function(n){ return n.id === nodeId; });
      if (!node) return { x: 0, y: 0 };
      var el = node.el;
      var port = el.querySelector('.cn-port.' + type);
      if (!port) return { x: node.x + 80, y: node.y + 50 };
      var wrapRect = canvasWrap.getBoundingClientRect();
      var portRect = port.getBoundingClientRect();
      return {
        x: portRect.left - wrapRect.left + portRect.width / 2,
        y: portRect.top - wrapRect.top + portRect.height / 2
      };
    }

    function bezierPath(x1, y1, x2, y2) {
      var dx = Math.abs(x2 - x1) * 0.5;
      return 'M' + x1 + ',' + y1 + ' C' + (x1 + dx) + ',' + y1 + ' ' + (x2 - dx) + ',' + y2 + ' ' + x2 + ',' + y2;
    }

    function updateConnections() {
      connections.forEach(function(c) {
        var from = getPortPos(c.fromId, 'out');
        var to = getPortPos(c.toId, 'in');
        c.el.setAttribute('d', bezierPath(from.x, from.y, to.x, to.y));

        // Arrow at target
        var angle = Math.atan2(to.y - from.y, to.x - from.x);
        var ax = to.x - 6 * Math.cos(angle);
        var ay = to.y - 6 * Math.sin(angle);
        var s = 5;
        var p1x = ax - s * Math.cos(angle - 0.5);
        var p1y = ay - s * Math.sin(angle - 0.5);
        var p2x = ax - s * Math.cos(angle + 0.5);
        var p2y = ay - s * Math.sin(angle + 0.5);
        c.arrowEl.setAttribute('points', to.x+','+to.y + ' ' + p1x+','+p1y + ' ' + p2x+','+p2y);
      });
    }

    // ── Templates ────────────────────────────────────────
    var TEMPLATES = {
      'CS Triage': [
        { role:'cs', x:80, y:120 },
        { role:'admin', x:320, y:60 },
        { role:'dev', x:320, y:200 },
        { role:'qa', x:560, y:200 },
        { conns: [[0,1],[0,2],[2,3]] }
      ],
      'Launch Pipeline': [
        { role:'admin', x:80, y:140 },
        { role:'mkt', x:300, y:80 },
        { role:'uxr', x:300, y:220 },
        { role:'dev', x:520, y:140 },
        { role:'qa', x:720, y:140 },
        { conns: [[0,1],[0,2],[1,3],[2,3],[3,4]] }
      ],
      'Content Flow': [
        { role:'content', x:80, y:140 },
        { role:'mkt', x:300, y:80 },
        { role:'uxr', x:300, y:220 },
        { role:'admin', x:520, y:140 },
        { conns: [[0,1],[0,2],[1,3],[2,3]] }
      ]
    };

    document.getElementById('btn-template').addEventListener('click', function() {
      var names = Object.keys(TEMPLATES);
      var idx = Math.floor(Math.random() * names.length);
      var name = names[idx];
      loadTemplate(name);
    });

    function loadTemplate(name) {
      clearCanvas();
      var tpl = TEMPLATES[name];
      if (!tpl) return;
      var connDef = [];
      var nodeMap = [];
      tpl.forEach(function(item) {
        if (item.conns) { connDef = item.conns; return; }
        addNode(item.role, item.x, item.y);
        nodeMap.push(nodes[nodes.length - 1].id);
      });
      connDef.forEach(function(pair) {
        addConnection(nodeMap[pair[0]], nodeMap[pair[1]]);
      });
      document.getElementById('flow-title').textContent = '/ Flows / ' + name;
    }

    // ── Clear ────────────────────────────────────────────
    document.getElementById('btn-clear').addEventListener('click', clearCanvas);
    function clearCanvas() {
      nodes.slice().forEach(function(n){ removeNode(n.id); });
      document.getElementById('flow-title').textContent = '/ Flows';
    }

    // ── Save ─────────────────────────────────────────────
    document.getElementById('btn-save').addEventListener('click', function() {
      var data = {
        nodes: nodes.map(function(n){ return { roleId: n.roleId, x: n.x, y: n.y }; }),
        connections: connections.map(function(c){
          var fi = nodes.findIndex(function(n){ return n.id === c.fromId; });
          var ti = nodes.findIndex(function(n){ return n.id === c.toId; });
          return [fi, ti];
        })
      };
      localStorage.setItem('ao_flow', JSON.stringify(data));
      var btn = this;
      btn.textContent = 'Saved!';
      setTimeout(function(){ btn.textContent = 'Save flow'; }, 1500);
    });

    // ── Run simulation ───────────────────────────────────
    document.getElementById('btn-run').addEventListener('click', function() {
      if (running || connections.length === 0) return;
      running = true;
      var panel = document.getElementById('runner-panel');
      panel.classList.add('visible');

      // Find entry nodes (nodes with no incoming connections)
      var hasIncoming = {};
      connections.forEach(function(c){ hasIncoming[c.toId] = true; });
      var entryNodes = nodes.filter(function(n){ return !hasIncoming[n.id]; });
      if (entryNodes.length === 0) entryNodes = [nodes[0]];

      // BFS through the graph
      var queue = entryNodes.map(function(n){ return n.id; });
      var visited = {};
      var order = [];
      while (queue.length > 0) {
        var nid = queue.shift();
        if (visited[nid]) continue;
        visited[nid] = true;
        order.push(nid);
        connections.forEach(function(c){
          if (c.fromId === nid && !visited[c.toId]) queue.push(c.toId);
        });
      }

      var step = 0;
      function runStep() {
        if (step >= order.length) {
          document.getElementById('runner-status').textContent = 'Done';
          document.getElementById('runner-status').className = 'runner-status done';
          document.getElementById('runner-text').textContent = 'Flow complete — all agents finished';
          connections.forEach(function(c){ c.el.classList.remove('active'); c.arrowEl.classList.remove('active'); });
          setTimeout(function(){
            panel.classList.remove('visible');
            running = false;
            document.getElementById('runner-status').textContent = 'Running';
            document.getElementById('runner-status').className = 'runner-status running';
          }, 2500);
          return;
        }

        var nid = order[step];
        var node = nodes.find(function(n){ return n.id === nid; });
        var role = ROLE_MAP[node.roleId];

        // Highlight node
        node.el.classList.add('selected');

        // Highlight outgoing connections
        connections.forEach(function(c){
          if (c.fromId === nid) { c.el.classList.add('active'); c.arrowEl.classList.add('active'); }
        });

        // Find task text
        var taskText = 'Processing...';
        connections.forEach(function(c) {
          if (c.fromId === nid) {
            var toNode = nodes.find(function(n){ return n.id === c.toId; });
            var key = node.roleId + '-' + toNode.roleId;
            if (SAMPLE_TASKS[key]) taskText = SAMPLE_TASKS[key];
          }
          if (c.toId === nid) {
            var fromNode = nodes.find(function(n){ return n.id === c.fromId; });
            var key2 = fromNode.roleId + '-' + node.roleId;
            if (SAMPLE_TASKS[key2]) taskText = SAMPLE_TASKS[key2];
          }
        });

        document.getElementById('runner-agent').textContent = role.abbr;
        document.getElementById('runner-agent').style.background = 'rgba(' + role.rgb + ',0.15)';
        document.getElementById('runner-agent').style.color = 'rgba(' + role.rgb + ',0.9)';
        document.getElementById('runner-text').textContent = taskText;

        if (step > 0) {
          document.getElementById('runner-status').textContent = 'Handoff';
          document.getElementById('runner-status').className = 'runner-status handoff';
        }
        setTimeout(function() {
          document.getElementById('runner-status').textContent = 'Running';
          document.getElementById('runner-status').className = 'runner-status running';
        }, 400);

        step++;
        setTimeout(function() {
          node.el.classList.remove('selected');
          connections.forEach(function(c){
            if (c.fromId === nid) { c.el.classList.remove('active'); c.arrowEl.classList.remove('active'); }
          });
          runStep();
        }, 1800);
      }

      runStep();
    });

    // ── Load saved flow on init ──────────────────────────
    (function() {
      var saved = localStorage.getItem('ao_flow');
      if (saved) {
        try {
          var data = JSON.parse(saved);
          if (data.nodes && data.nodes.length > 0) {
            data.nodes.forEach(function(n){ addNode(n.roleId, n.x, n.y); });
            if (data.connections) {
              data.connections.forEach(function(pair){
                if (nodes[pair[0]] && nodes[pair[1]]) {
                  addConnection(nodes[pair[0]].id, nodes[pair[1]].id);
                }
              });
            }
            return;
          }
        } catch(e) {}
      }
      // Default: load a template
      loadTemplate('CS Triage');
    })();
  </script>
</body>
