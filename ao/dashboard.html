<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard — AO Admin</title>
  <meta name="description" content="AO admin dashboard. Manage organizations, monitor agents, run ops." />
  <link rel="icon" href="/assets/favicon.svg" />
  <style>
    :root {
      --bg: #070812;
      --bg2: #0b1021;
      --panel: rgba(255,255,255,0.05);
      --panel2: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.09);
      --border2: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.58);
      --faint: rgba(255,255,255,0.38);
      --ghost: rgba(255,255,255,0.22);
      --hairline: rgba(255,255,255,0.07);
      --amber: 245,158,11;
      --purple: 168,139,250;
      --green: 52,211,153;
      --blue: 96,165,250;
      --pink: 244,114,182;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 8px;
      --max: 1060px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --ease: cubic-bezier(.2,.8,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { height: 100%; }
    body {
      margin: 0; min-height: 100%;
      font-family: var(--font); color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(1000px 700px at 15% -5%, rgba(245,158,11,0.08), transparent 50%),
        radial-gradient(800px 600px at 90% 5%, rgba(168,139,250,0.10), transparent 50%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--text); text-decoration: none; }
    ::selection { background: rgba(245,158,11,0.25); }

    /* ── Nav ─────────────────────────────────────────────── */
    .ao-nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(7,8,18,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .ao-nav-inner {
      width: min(var(--max), calc(100% - 48px));
      margin: 0 auto;
      display: flex; align-items: center; height: 54px;
    }
    .ao-nav-logo {
      font-size: 0.95rem; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
      color: var(--text); text-decoration: none;
      margin-right: auto; flex-shrink: 0;
    }
    .ao-nav-context { font-weight: 400; color: var(--muted); margin-left: 2px; }
    .ao-nav-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgb(var(--amber));
      box-shadow: 0 0 7px rgba(var(--amber),0.6);
      flex-shrink: 0;
      animation: dotPulse 2.5s ease-in-out infinite;
    }
    @keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .ao-nav-links { display: flex; gap: 22px; font-size: 0.84rem; margin-right: 20px; }
    .ao-nav-links a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .ao-nav-links a:hover { color: var(--text); }
    .ao-nav-links a.current { color: var(--text); }
    .ao-nav-admin {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 5px 11px; border-radius: 6px;
      background: rgba(var(--amber),0.14);
      border: 1px solid rgba(var(--amber),0.28);
      color: rgb(var(--amber));
    }
    @media (max-width: 600px) {
      .ao-nav-links { gap: 12px; }
      .ao-nav-links a:nth-last-child(-n+1) { display: none; }
    }

    /* ── Container ───────────────────────────────────────── */
    .container { width: min(var(--max), calc(100% - 48px)); margin: 0 auto; }

    /* ── Page header ─────────────────────────────────────── */
    .dash-header {
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap;
      gap: 16px; padding: 36px 0 28px;
    }
    .dash-header h1 {
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      font-weight: 700; letter-spacing: -0.02em; margin: 0;
    }
    .dash-header p { color: var(--muted); font-size: 0.9rem; margin: 4px 0 0; }
    .btn-new-org {
      font-family: var(--font); font-size: 0.88rem; font-weight: 600;
      padding: 10px 20px; border-radius: var(--radius-sm);
      background: rgba(var(--amber),0.14);
      border: 1px solid rgba(var(--amber),0.28);
      color: rgb(var(--amber)); cursor: pointer;
      text-decoration: none; transition: all 0.2s var(--ease);
      white-space: nowrap;
    }
    .btn-new-org:hover { background: rgba(var(--amber),0.22); }

    /* ── Stats row ───────────────────────────────────────── */
    .stats-row {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 32px;
    }
    .stat-pill {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 18px;
      display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 100px;
    }
    .stat-pill strong {
      font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em;
      line-height: 1; color: var(--text);
    }
    .stat-pill span { font-size: 0.75rem; color: var(--faint); font-family: var(--mono); }

    /* ── Org grid ────────────────────────────────────────── */
    .org-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px; margin-bottom: 48px;
    }
    .org-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 22px 20px 18px;
      display: flex; flex-direction: column; gap: 0;
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
      animation: cardIn 0.3s var(--ease) both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    .org-card:hover { border-color: var(--border2); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .org-card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px; margin-bottom: 10px;
    }
    .org-name { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
    .org-type { font-size: 0.75rem; color: var(--faint); font-family: var(--mono); }
    .org-status {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; padding: 3px 8px; border-radius: 4px; flex-shrink: 0;
    }
    .org-status.active {
      background: rgba(var(--green),0.12); color: rgb(var(--green));
      border: 1px solid rgba(var(--green),0.2);
    }
    .org-status.draft {
      background: rgba(var(--amber),0.1); color: rgb(var(--amber));
      border: 1px solid rgba(var(--amber),0.2);
    }
    .org-focus {
      display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px;
    }
    .focus-tag {
      font-size: 0.72rem; padding: 3px 9px; border-radius: 20px;
      background: rgba(var(--purple),0.1); color: rgba(var(--purple),0.9);
      border: 1px solid rgba(var(--purple),0.18);
    }
    .org-meta {
      display: flex; gap: 16px; margin-bottom: 16px;
      font-size: 0.8rem; color: var(--faint); font-family: var(--mono);
    }
    .org-meta .m-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      margin-right: 5px; vertical-align: middle;
    }
    .org-actions { display: flex; gap: 8px; margin-top: auto; }
    .btn-manage {
      flex: 1; font-family: var(--font); font-size: 0.82rem; font-weight: 600;
      padding: 9px 14px; border-radius: var(--radius-sm); text-align: center;
      background: rgba(var(--purple),0.12); border: 1px solid rgba(var(--purple),0.22);
      color: rgb(var(--purple)); text-decoration: none; transition: all 0.2s var(--ease);
    }
    .btn-manage:hover { background: rgba(var(--purple),0.2); }
    .btn-run {
      flex: 1; font-family: var(--font); font-size: 0.82rem; font-weight: 600;
      padding: 9px 14px; border-radius: var(--radius-sm); text-align: center;
      background: rgba(var(--amber),0.12); border: 1px solid rgba(var(--amber),0.22);
      color: rgb(var(--amber)); text-decoration: none; transition: all 0.2s var(--ease);
    }
    .btn-run:hover { background: rgba(var(--amber),0.2); }

    /* ── Empty state ─────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1; text-align: center;
      padding: 60px 24px; border: 1px dashed var(--border);
      border-radius: var(--radius-lg); color: var(--faint);
    }
    .empty-state h3 { font-size: 1rem; font-weight: 600; color: var(--muted); margin: 0 0 8px; }
    .empty-state p { font-size: 0.875rem; margin: 0 0 20px; }

    /* ── Services ────────────────────────────────────────── */
    .services-section { margin-bottom: 40px; }
    .section-label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--faint); margin-bottom: 14px;
    }
    .svc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    .svc-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      transition: border-color 0.2s var(--ease);
      text-decoration: none;
    }
    .svc-card:hover { border-color: var(--border2); }
    .svc-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .svc-dot.online { background: rgb(var(--green)); box-shadow: 0 0 6px rgba(var(--green),0.5); }
    .svc-dot.offline { background: rgb(var(--pink)); box-shadow: 0 0 6px rgba(var(--pink),0.4); }
    .svc-dot.na { background: var(--ghost); }
    .svc-info { flex: 1; min-width: 0; }
    .svc-name { font-size: 0.84rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .svc-desc { font-size: 0.7rem; color: var(--faint); font-family: var(--mono); margin-top: 1px; }
    .svc-arrow { color: var(--ghost); font-size: 0.8rem; flex-shrink: 0; transition: color 0.2s; }
    .svc-card:hover .svc-arrow { color: var(--muted); }

    /* ── Live Queue ──────────────────────────────────────── */
    .queue-section { margin-bottom: 40px; }
    .queue-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
    }
    .queue-stats {
      display: flex; gap: 16px; font-family: var(--mono); font-size: 0.72rem; color: var(--faint);
    }
    .queue-stats strong {
      color: var(--text); font-size: 0.88rem; font-family: var(--font); display: block; margin-bottom: 1px;
    }
    .queue-badge {
      font-size: 0.66rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: rgb(var(--green));
      display: flex; align-items: center; gap: 5px;
    }
    .queue-badge .qb-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgb(var(--green)); box-shadow: 0 0 5px rgba(var(--green),0.5);
      animation: dotPulse 2.5s ease-in-out infinite;
    }
    .q-list { display: flex; flex-direction: column; gap: 5px; }
    .q-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px 14px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; transition: all 0.25s var(--ease);
      animation: qIn 0.3s var(--ease) both;
      position: relative; overflow: hidden;
    }
    @keyframes qIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .q-item:hover { border-color: var(--border2); }
    .q-item.st-blocked { border-color: rgba(248,113,113,0.25); background: rgba(248,113,113,0.04); }
    .q-item.st-healing { border-color: rgba(var(--amber),0.3); background: rgba(var(--amber),0.04); }
    .q-item.st-healed  { border-color: rgba(var(--green),0.25); background: rgba(var(--green),0.04); }
    .q-agent-icon {
      width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 700; font-family: var(--mono);
    }
    .q-body { flex: 1; min-width: 0; }
    .q-task-name { font-size: 0.82rem; font-weight: 500; line-height: 1.35; margin-bottom: 2px; }
    .q-meta-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.7rem; color: var(--faint); font-family: var(--mono);
    }
    .q-st {
      font-size: 0.64rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 2px 7px; border-radius: 4px; white-space: nowrap;
    }
    .q-st.done     { background: rgba(var(--green),0.12); color: rgb(var(--green)); }
    .q-st.progress  { background: rgba(var(--blue),0.12); color: rgb(var(--blue)); }
    .q-st.queued    { background: rgba(255,255,255,0.06); color: var(--faint); }
    .q-st.blocked   { background: rgba(248,113,113,0.15); color: rgb(248,113,113); }
    .q-st.healing, .q-st.diagnosing { background: rgba(var(--amber),0.15); color: rgb(var(--amber)); animation: qPulse 1.5s ease-in-out infinite; }
    .q-st.healed    { background: rgba(var(--green),0.15); color: rgb(var(--green)); }
    @keyframes qPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .q-heal-line { font-size: 0.72rem; color: rgb(var(--amber)); margin-top: 4px; line-height: 1.35; }
    .q-heal-line.resolved { color: rgb(var(--green)); }
    .q-ts { margin-left: auto; font-size: 0.68rem; color: var(--ghost); white-space: nowrap; flex-shrink: 0; padding-top: 2px; }

    .completed-section { margin-top: 14px; }
    .completed-toggle {
      font-family: var(--font); font-size: 0.78rem; font-weight: 600;
      color: var(--muted); background: none; border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: all 0.2s;
      width: 100%;
    }
    .completed-toggle:hover { border-color: var(--border2); color: var(--text); }
    .completed-toggle .ct-count {
      font-family: var(--mono); font-size: 0.72rem; color: rgb(var(--green));
      margin-left: auto;
    }
    .completed-toggle .ct-arrow { transition: transform 0.2s; }
    .completed-toggle.open .ct-arrow { transform: rotate(180deg); }
    .completed-list {
      display: none; flex-direction: column; gap: 4px;
      margin-top: 8px; padding: 4px 0;
      max-height: 280px; overflow-y: auto;
    }
    .completed-list.open { display: flex; }
    .completed-list .q-item { opacity: 0.65; }
    .completed-list .q-item:hover { opacity: 1; }

    /* ── Footer ──────────────────────────────────────────── */
    .dash-footer {
      border-top: 1px solid var(--hairline); padding: 20px 0;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.78rem; color: var(--faint); margin-top: 0;
    }
    .dash-footer a { color: var(--muted); }
    .dash-footer a:hover { color: var(--text); }
    .admin-badge {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: rgb(var(--amber));
      background: rgba(var(--amber),0.1); border: 1px solid rgba(var(--amber),0.2);
      border-radius: 4px; padding: 2px 7px;
    }
  </style>
</head>
<body>

  <nav class="ao-nav">
    <div class="ao-nav-inner">
      <a href="/ao/" class="ao-nav-logo">
        <span class="ao-nav-dot"></span>AO<span class="ao-nav-context">/ Admin</span>
      </a>
      <div class="ao-nav-links">
        <a href="/ao/">Overview</a>
        <a href="/ao/onboard.html">Get started</a>
        <a href="/ao/configure.html">Configure</a>
        <a href="/ao/queue.html">Queue</a>
        <a href="/ao/dashboard.html" class="current">Dashboard</a>
      </div>
      <span class="ao-nav-admin">Admin</span>
    </div>
  </nav>

  <div class="container">

    <div class="dash-header">
      <div>
        <h1>Organizations</h1>
        <p>Manage and run your AO-powered orgs.</p>
      </div>
      <a href="/ao/onboard.html" class="btn-new-org">+ New org</a>
    </div>

    <div class="stats-row" id="stats-row">
      <div class="stat-pill"><strong id="stat-orgs">0</strong><span>orgs</span></div>
      <div class="stat-pill"><strong id="stat-active">0</strong><span>active</span></div>
      <div class="stat-pill"><strong id="stat-agents">0</strong><span>agents</span></div>
      <div class="stat-pill"><strong id="stat-humans">0</strong><span>humans</span></div>
    </div>

    <div class="org-grid" id="org-grid"></div>

    <div class="services-section">
      <div class="section-label">Services</div>
      <div class="svc-grid" id="svc-grid"></div>
    </div>

    <div class="queue-section">
      <div class="queue-header">
        <div class="section-label">Live work queue</div>
        <div class="queue-stats">
          <div><strong id="q-active">0</strong>active</div>
          <div><strong id="q-done">0</strong>done</div>
          <div><strong id="q-healed">0</strong>healed</div>
        </div>
        <span class="queue-badge"><span class="qb-dot"></span>Live</span>
      </div>
      <div class="q-list" id="q-active-list"></div>
      <div class="completed-section">
        <button class="completed-toggle" id="completed-toggle">
          <span class="ct-arrow">▾</span> Completed
          <span class="ct-count" id="ct-count">0</span>
        </button>
        <div class="completed-list" id="completed-list"></div>
      </div>
    </div>

    <footer class="dash-footer">
      <div><a href="/ao/">AO Overview</a> · <a href="/ao/queue.html">Queue</a> · <a href="/">deliberateux.com</a></div>
      <span class="admin-badge">Admin</span>
    </footer>

  </div>

  <script>
    // ── Mark admin session ────────────────────────────────
    localStorage.setItem('ao_admin', '1');

    // ── Load orgs ─────────────────────────────────────────
    var orgs = JSON.parse(localStorage.getItem('ao_orgs') || '[]');

    // ── Stats ─────────────────────────────────────────────
    var totalAgents = 0, totalHumans = 0, activeCount = 0;
    orgs.forEach(function(o) {
      if (o.status === 'active') activeCount++;
      Object.values(o.operators || {}).forEach(function(v) {
        if (v === 'agent') totalAgents++; else totalHumans++;
      });
    });
    document.getElementById('stat-orgs').textContent = orgs.length;
    document.getElementById('stat-active').textContent = activeCount;
    document.getElementById('stat-agents').textContent = totalAgents;
    document.getElementById('stat-humans').textContent = totalHumans;

    // ── Render orgs ───────────────────────────────────────
    var grid = document.getElementById('org-grid');

    if (orgs.length === 0) {
      grid.innerHTML = '<div class="empty-state">' +
        '<h3>No organizations yet</h3>' +
        '<p>Set up your first org to get started.</p>' +
        '<a href="/ao/onboard.html" style="display:inline-flex;align-items:center;gap:6px;font-size:0.88rem;font-weight:600;padding:10px 20px;border-radius:8px;background:rgba(245,158,11,0.14);border:1px solid rgba(245,158,11,0.28);color:rgb(245,158,11);text-decoration:none;">+ Create your first org</a>' +
        '</div>';
    } else {
      var TYPE_LABELS = {
        solo: 'Solo operator', 'small-team': 'Small team',
        agency: 'Agency / studio', startup: 'Startup', creative: 'Creative practice'
      };

      orgs.forEach(function(org, i) {
        var agents = Object.values(org.operators || {}).filter(function(v){return v==='agent';}).length;
        var humans = Object.values(org.operators || {}).filter(function(v){return v==='human';}).length;
        var focusTags = (org.focus || []).slice(0, 4).map(function(f) {
          return '<span class="focus-tag">' + f.replace(/-/g,' ') + '</span>';
        }).join('');
        var statusClass = org.status === 'active' ? 'active' : 'draft';
        var statusLabel = org.status === 'active' ? 'Active' : 'Draft';
        var typeLabel = TYPE_LABELS[org.type] || org.type || '—';
        var updated = org.updatedAt || org.createdAt || '—';

        var card = document.createElement('div');
        card.className = 'org-card';
        card.style.animationDelay = (i * 50) + 'ms';
        card.innerHTML =
          '<div class="org-card-top">' +
            '<div>' +
              '<div class="org-name">' + escHtml(org.name || org.slug) + '</div>' +
              '<div class="org-type">' + escHtml(typeLabel) + '</div>' +
            '</div>' +
            '<span class="org-status ' + statusClass + '">' + statusLabel + '</span>' +
          '</div>' +
          (focusTags ? '<div class="org-focus">' + focusTags + '</div>' : '') +
          '<div class="org-meta">' +
            '<span><span class="m-dot" style="background:rgb(96,165,250)"></span>' + agents + ' agents</span>' +
            '<span><span class="m-dot" style="background:rgb(52,211,153)"></span>' + humans + ' humans</span>' +
            '<span style="margin-left:auto;font-size:0.72rem;">' + updated + '</span>' +
          '</div>' +
          '<div class="org-actions">' +
            '<a class="btn-manage" href="/ao/configure.html?org=' + encodeURIComponent(org.slug) + '&admin=1">Edit config</a>' +
            '<a class="btn-run" href="/ao/configure.html?org=' + encodeURIComponent(org.slug) + '&admin=1">Run →</a>' +
          '</div>';
        grid.appendChild(card);
      });
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Live queue simulation ──────────────────────────
    (function() {
      var QA = {
        admin:{abbr:'EA', rgb:'168,139,250'}, dev:{abbr:'Dev',rgb:'96,165,250'},
        qa:{abbr:'QA',rgb:'251,191,36'}, mkt:{abbr:'Mkt',rgb:'244,114,182'},
        uxr:{abbr:'UXR',rgb:'52,211,153'}, cs:{abbr:'CS',rgb:'110,231,183'},
        biz:{abbr:'Biz',rgb:'147,197,253'}, ops:{abbr:'Ops',rgb:'248,113,113'}
      };
      var POOL = [
        {a:'dev',t:'Implement dashboard org card rendering'},{a:'dev',t:'Add localStorage persistence for configs'},
        {a:'dev',t:'Build work queue visualization widget'},{a:'dev',t:'Optimize nav backdrop-filter for Safari'},
        {a:'dev',t:'Wire onboard wizard state to configure'},{a:'dev',t:'Refactor role-grid template rendering'},
        {a:'qa',t:'Regression test: template picker sync'},{a:'qa',t:'Cross-browser test: sticky nav on iOS'},
        {a:'qa',t:'Verify admin mode URL param flow'},{a:'qa',t:'Visual diff: configure page after redesign'},
        {a:'mkt',t:'Draft AO product page launch copy'},{a:'mkt',t:'Competitive scan: agent platform landscape'},
        {a:'mkt',t:'Write beta access announcement email'},{a:'mkt',t:'Position AO vs. traditional agency model'},
        {a:'uxr',t:'Accessibility audit: configure role cards'},{a:'uxr',t:'Heuristic eval: onboard wizard flow'},
        {a:'uxr',t:'Review CTA placement on configure page'},{a:'uxr',t:'Color contrast check: admin amber on dark'},
        {a:'cs',t:'Process inbound beta request — inbox API'},{a:'cs',t:'Triage: user reports configure page error'},
        {a:'cs',t:'Draft reply: partnership inquiry from VC'},{a:'cs',t:'Route feature request to dev backlog'},
        {a:'admin',t:'Synthesize weekly cross-agent status'},{a:'admin',t:'Review ethics alignment on marketing copy'},
        {a:'biz',t:'Pricing model analysis: per-seat vs per-org'},{a:'biz',t:'Distribution research: marketplace listing'},
        {a:'ops',t:'Monitor page load time after nav changes'},{a:'ops',t:'SSL cert check: deliberateux.com Cloudflare'}
      ];
      var HEALS = [
        {cause:'Inbox API timeout (rate limit)',fix:'Switched to fallback IMAP endpoint'},
        {cause:'Dependency stale: waiting on QA >15min',fix:'Auto-escalated to admin, QA fast-tracked'},
        {cause:'External API 503: analytics down',fix:'Cached last known data, flagged for retry'},
        {cause:'Token budget exceeded mid-task',fix:'Split into sub-tasks, resumed fresh'},
        {cause:'Handoff format mismatch from upstream',fix:'Auto-normalized payload, notified admin'}
      ];

      // Shuffle pool
      for(var i=POOL.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=POOL[i];POOL[i]=POOL[j];POOL[j]=tmp;}

      var tasks=[],completed=[],nid=1,healedN=0,pidx=0;
      var activeEl=document.getElementById('q-active-list');
      var compEl=document.getElementById('completed-list');

      function mkTask(status,ageSec){
        var p=POOL[pidx%POOL.length];pidx++;
        return{id:nid++,a:p.a,t:p.t,status:status,born:Date.now()+(ageSec||0)*1000,hs:null,hr:null,bat:0};
      }

      // Seed: 2 progress, 1 blocked, 1 queued
      tasks.push(mkTask('progress',-25));
      tasks.push(mkTask('progress',-12));
      var bt=mkTask('blocked',-20);bt.hr=HEALS[0];bt.bat=Date.now()-20000;
      tasks.push(bt);
      tasks.push(mkTask('queued',-2));

      // Seed some completed
      for(var c=0;c<3;c++){var ct=mkTask('done',-120-c*40);completed.push(ct);}

      function renderActive(){
        // Sort: blocked/healing up top, then newest first
        tasks.sort(function(a,b){
          var aw=(a.status==='blocked'||a.hs==='diagnosing'||a.hs==='healing')?0:1;
          var bw=(b.status==='blocked'||b.hs==='diagnosing'||b.hs==='healing')?0:1;
          if(aw!==bw)return aw-bw;
          return b.id-a.id;
        });
        activeEl.innerHTML='';
        tasks.forEach(function(t,i){
          var ag=QA[t.a]||{abbr:'?',rgb:'255,255,255'};
          var sc=t.hs||t.status;
          var sl=sc;
          if(sc==='progress')sl='active';
          if(sc==='diagnosing')sl='diagnosing\u2026';
          if(sc==='healing')sl='healing\u2026';

          var ago=Math.max(0,Math.floor((Date.now()-t.born)/1000));
          var agoS=ago<60?ago+'s ago':Math.floor(ago/60)+'m ago';

          var hh='';
          if(t.hs==='diagnosing')hh='<div class="q-heal-line">Auto-heal \u2014 diagnosing: '+escHtml(t.hr.cause)+'</div>';
          else if(t.hs==='healing')hh='<div class="q-heal-line">Healing: '+escHtml(t.hr.fix)+'</div>';

          var el=document.createElement('div');
          el.className='q-item st-'+sc;
          el.style.animationDelay=(i*25)+'ms';
          el.innerHTML=
            '<div class="q-agent-icon" style="background:rgba('+ag.rgb+',0.14);color:rgba('+ag.rgb+',0.9)">'+ag.abbr+'</div>'+
            '<div class="q-body"><div class="q-task-name">'+escHtml(t.t)+'</div>'+
            '<div class="q-meta-row"><span class="q-st '+sc+'">'+sl+'</span><span>'+escHtml(t.a)+'</span></div>'+hh+'</div>'+
            '<div class="q-ts">'+agoS+'</div>';
          activeEl.appendChild(el);
        });
      }

      function renderCompleted(){
        compEl.innerHTML='';
        // Show newest first, max 15
        var show=completed.slice(-15).reverse();
        show.forEach(function(t){
          var ag=QA[t.a]||{abbr:'?',rgb:'255,255,255'};
          var hh='';
          if(t.hr)hh='<div class="q-heal-line resolved">Healed: '+escHtml(t.hr.fix)+'</div>';
          var el=document.createElement('div');
          el.className='q-item st-done';
          el.innerHTML=
            '<div class="q-agent-icon" style="background:rgba('+ag.rgb+',0.14);color:rgba('+ag.rgb+',0.9)">'+ag.abbr+'</div>'+
            '<div class="q-body"><div class="q-task-name">'+escHtml(t.t)+'</div>'+
            '<div class="q-meta-row"><span class="q-st '+(t.hr?'healed':'done')+'">'+(t.hr?'healed':'done')+'</span><span>'+escHtml(t.a)+'</span></div>'+hh+'</div>';
          compEl.appendChild(el);
        });
        document.getElementById('ct-count').textContent=completed.length;
      }

      function updateQStats(){
        var ac=0;
        tasks.forEach(function(t){if(t.status==='progress')ac++;});
        document.getElementById('q-active').textContent=ac;
        document.getElementById('q-done').textContent=completed.length;
        document.getElementById('q-healed').textContent=healedN;
      }

      function tick(){
        var justDone=[];
        tasks.forEach(function(t){
          var age=Date.now()-t.born;
          if(t.status==='queued'&&age>(3500+Math.random()*3500)){t.status='progress';}
          else if(t.status==='progress'&&age>(9000+Math.random()*12000)){
            if(t.a==='cs'&&Math.random()<0.35&&!t.hr){
              t.status='blocked';t.hr=HEALS[Math.floor(Math.random()*HEALS.length)];t.bat=Date.now();
            }else{t.status='done';justDone.push(t);}
          }
          else if(t.status==='progress'&&age>7000&&!t.hr&&t.a!=='cs'&&Math.random()<0.003){
            t.status='blocked';t.hr=HEALS[Math.floor(Math.random()*HEALS.length)];t.bat=Date.now();
          }
          // Auto-heal sequence
          if(t.status==='blocked'&&t.bat){
            var ba=Date.now()-t.bat;
            if(ba>4500&&!t.hs)t.hs='diagnosing';
            if(ba>7500&&t.hs==='diagnosing')t.hs='healing';
            if(ba>10500&&t.hs==='healing'){t.status='done';t.hs=null;healedN++;justDone.push(t);}
          }
        });
        // Move done tasks to completed
        justDone.forEach(function(t){
          completed.push(t);
          tasks=tasks.filter(function(x){return x.id!==t.id;});
        });
        renderActive();renderCompleted();updateQStats();
      }

      function inject(){
        tasks.push(mkTask('queued',0));
        if(tasks.length>12){
          var doneTasks=tasks.filter(function(t){return t.status==='done';});
          doneTasks.forEach(function(t){completed.push(t);});
          tasks=tasks.filter(function(t){return t.status!=='done';});
        }
      }

      // Completed toggle
      document.getElementById('completed-toggle').addEventListener('click',function(){
        this.classList.toggle('open');
        compEl.classList.toggle('open');
      });

      // Boot
      renderActive();renderCompleted();updateQStats();
      setInterval(tick,1400);
      setInterval(inject,5500+Math.random()*3500);
    })();

    // ── Services panel ────────────────────────────────────
    var SERVICES = [
      { name:'Theme Studio',   desc:':18794', url:'http://100.71.12.80:18794/theme-studio.html', probe:true },
      { name:'Design System',  desc:':18794', url:'http://100.71.12.80:18794/design-system.html', probe:true },
      { name:'Demo Mode',      desc:'Guest-safe', url:'http://100.71.12.80:18794/ts.html?demo=true', probe:true },
      { name:'CRM API',        desc:':18800', url:'http://100.71.12.80:18800/api/leads', probe:true },
      { name:'Work Queue',     desc:'AO page', url:'/ao/queue.html', status:'online' },
      { name:'Contact Form',   desc:':18794', url:'http://100.71.12.80:18794/contact.html', probe:true },
      { name:'Pricing',        desc:':18794', url:'http://100.71.12.80:18794/pricing.html', probe:true },
      { name:'GA4 Analytics',  desc:'G-9MSXWF3TX3', url:'https://analytics.google.com/', status:'na' },
    ];

    var svcGrid = document.getElementById('svc-grid');
    SERVICES.forEach(function(svc, i) {
      var dotClass = svc.status === 'na' ? 'na' : (svc.status === 'online' ? 'online' : 'na');
      var card = document.createElement('a');
      card.className = 'svc-card';
      card.href = svc.url;
      card.target = svc.url.startsWith('/') ? '_self' : '_blank';
      card.rel = 'noopener';
      card.id = 'svc-' + i;
      card.innerHTML =
        '<span class="svc-dot ' + dotClass + '" id="svc-dot-' + i + '"></span>' +
        '<div class="svc-info"><div class="svc-name">' + escHtml(svc.name) + '</div>' +
        '<div class="svc-desc">' + escHtml(svc.desc) + '</div></div>' +
        '<span class="svc-arrow">→</span>';
      svcGrid.appendChild(card);

      // Probe VPS services (best-effort, CORS may block)
      if (svc.probe) {
        var dot = card.querySelector('.svc-dot');
        var controller = new AbortController();
        var timer = setTimeout(function(){ controller.abort(); }, 3000);
        fetch(svc.url, { mode:'no-cors', signal:controller.signal })
          .then(function(){ clearTimeout(timer); dot.className = 'svc-dot online'; })
          .catch(function(){ clearTimeout(timer); dot.className = 'svc-dot offline'; });
      }
    });
  </script>
